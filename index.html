<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hostel-OS Bocas</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

    <!-- LOADING (mejora UX) -->
    <div id="loading" style="position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <h2>Cargando sistema...</h2>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="screen">
        <div class="login-container">
            <div class="logo">
                <h1>🏝️ Hostel-OS</h1>
                <p>Bocas del Toro</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="login-email" required placeholder="tu@email.com">
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn btn-primary btn-large">Ingresar</button>
                <div id="login-error" class="error-message"></div>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div id="app-screen" class="screen hidden">

        <!-- HEADER -->
        <header class="app-header">
            <div class="header-left">
                <h2 id="page-title">Dashboard</h2>
            </div>
            <div class="header-right">
                <span id="user-role" class="badge"></span>
                <button onclick="logout()" class="btn btn-small">Salir</button>
            </div>
        </header>

        <!-- NAV -->
        <nav class="bottom-nav">
            <button onclick="showDashboard()" class="nav-btn active">
                📊 Inicio
            </button>
            <button onclick="showReservations()" class="nav-btn">
                🛏️ Reservas
            </button>
            <button onclick="showNewReservation()" class="nav-btn nav-btn-main">
                ➕ Nueva
            </button>
            <button onclick="showOperations()" class="nav-btn">
                🧹 Tareas
            </button>
            <button onclick="showFinances()" class="nav-btn admin-only hidden">
                💰 Caja
            </button>
        </nav>

        <!-- CONTENIDO -->
        <main id="main-content">

            <!-- DASHBOARD -->
            <div id="dashboard-page" class="page">
                <h3 id="current-date">Hoy</h3>
                <p>Bienvenido al sistema</p>
            </div>

            <!-- RESERVAS -->
            <div id="reservations-page" class="page hidden">
                <h3>Reservas</h3>
            </div>

            <!-- NUEVA -->
            <div id="new-reservation-page" class="page hidden">
                <h3>Nueva reserva</h3>
            </div>

            <!-- OPERACIONES -->
            <div id="operations-page" class="page hidden">
                <h3>Tareas</h3>
            </div>

            <!-- FINANZAS -->
            <div id="finances-page" class="page hidden">
                <h3>Finanzas</h3>
            </div>

        </main>
    </div>

    <!-- TOAST -->
    <div id="toast-container"></div>

    <!-- SCRIPT PRINCIPAL (ÚNICO) -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
